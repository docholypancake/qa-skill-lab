name: Module 03 — Python API Tests

on:
  push:
    paths:
      - "03-python-automation/**"
  pull_request:
    paths:
      - "03-python-automation/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 03-python-automation/requirements.txt

      - name: Run pytest
        env:
          BASE_URL: https://restful-booker.herokuapp.com
          USERNAME: admin
          PASSWORD: password123
        run: |
          pytest 03-python-automation/tests/ -v --tb=short
