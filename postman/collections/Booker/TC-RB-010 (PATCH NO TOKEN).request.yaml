$kind: http-request
url: "{{base_url}}/booking/{{booking_id}}"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: '{"firstname": "Updated","totalprice": 999}'
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 403", function () {
          pm.response.to.have.status(403);
      });
    language: text/javascript
order: 10000
