$kind: http-request
url: "{{base_url}}/booking"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: '{"lastname": "Brown","totalprice": 111,"depositpaid": true,"bookingdates": {"checkin": "2024-01-01","checkout": "2024-01-05"}}'
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      // INTENTIONAL FAILURE — documents defect: missing required field 'firstname' accepted
      // Expected: 400 Bad Request
      // Actual: 200 OK (API creates booking with missing firstname)
      pm.test("[DEFECT] Status should be 400 — API accepts missing firstname field", function () {
          pm.response.to.have.status(400);
      });
    language: text/javascript
order: 14000
