$kind: http-request
url: "{{base_url}}/booking/{{booking_id}}"
method: DELETE
headers:
  Cookie: token={{token}}
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 201", function () {
          pm.response.to.have.status(201);
      });
    language: text/javascript
order: 11000
